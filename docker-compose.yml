services:
  db:
    image: postgres:16-alpine
    platform: linux/arm64
    container_name: nestjs-blog-db
    environment:
      POSTGRES_USER: postgresql
      POSTGRES_PASSWORD: postgresql
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: nestjs-blog-app
    environment:
      - DATABASE_URL=postgresql://postgresql:postgresql@db:5432/blog
    ports:
      - "3000:3000"
      - "5555:5555"
    depends_on:
      - db
    volumes:
      - ./:/app
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]

volumes:
  postgres_data:
